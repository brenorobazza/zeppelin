name: CI

on:
  push:
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libpq-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip wheel
        pip install "setuptools<81"
        pip install -r requirements-dev.txt

    - name: Run pre-commit
      run: pre-commit run --all-files

    # Esta etapa protege especificamente a camada analitica criada para o TCC.
    # Ela cobre os endpoints de dashboard, results, recommendations e history.
    - name: Run Django analytics tests
      env:
        SECRET_KEY: zeppelin-ci-secret
        DB_ENGINE_TEST: django.db.backends.sqlite3
        DB_NAME_TEST: /tmp/zeppelin-test.sqlite3
        DB_USER_TEST: ""
        DB_PASSWORD_TEST: ""
        DB_HOST_TEST: ""
        DB_PORT_TEST: ""
        EMAIL_HOST: localhost
        EMAIL_PORT: "25"
        EMAIL_HOST_USER: ""
        EMAIL_HOST_PASSWORD: ""
        EMAIL_USE_TLS: "False"
        DEFAULT_FROM_EMAIL: ci@example.com
        URL: http://localhost
        URL_VALIDATION: password_reset
        HASHIDS_SALT: zeppelin-ci-salt
      run: |
        cd backend
        python manage.py test apps.questionnaire.test_analytics --settings=zeppelin.settings.test

    - name: Set up Node.js (if frontend exists)
      uses: actions/setup-node@v4
      with:
        node-version: '18'
      if: hashFiles('frontend/package.json') != ''

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install
      if: hashFiles('frontend/package.json') != ''

    # O build do frontend garante que as telas do TCC continuam compilando.
    - name: Build frontend
      run: |
        cd frontend
        npm run build
      if: hashFiles('frontend/package.json') != ''

    # - name: Run frontend tests
    #   run: |
    #     cd frontend
    #     npm test -- --coverage --watchAll=false
    #   if: hashFiles('frontend/package.json') != ''
